<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior's Gate | Kaththi Sandai Login</title>
    <link rel="stylesheet" href="static/login_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container fade-in">
        <header class="login-header">
            <h1 class="main-title">WARRIOR'S <span class="accent">GATE</span></h1>
            <p class="subtitle">Identify yourself to enter the arena.</p>
        </header>

        <form class="login-form"  method="POST">
            <div class="input-group">
                <label for="username">Warrior Name</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="input-group">
                <label for="password">Secret Code (Password)</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <span>ENTER THE ARENA ⚔️</span>
            </button>
        </form> 
        {% if invaliduser %}
        <p class="subtitleexception">Invalid User Name</p>
        {% endif %}
        {% if invalidpass %}
        <p class="subtitle_exception">Incorrect Password</p>
        {% endif %}

    </div>
   
</body>
</html>
